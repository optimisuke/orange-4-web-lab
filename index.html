<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORANGE-4 Web Lab</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">GMC-4 compatible</p>
          <h1>ORANGE-4 Web Lab</h1>
        </div>
        <div class="run-controls" aria-label="実行操作">
          <button id="assembleButton" type="button">Assemble</button>
          <button id="loadHexButton" type="button">Load HEX</button>
          <button id="stepButton" type="button">Step</button>
          <button id="runButton" type="button">Run</button>
          <button id="resetButton" type="button">Reset</button>
        </div>
      </header>

      <section class="workspace">
        <section class="panel editor-panel" aria-labelledby="sourceTitle">
          <div class="panel-header">
            <h2 id="sourceTitle">Source</h2>
            <span id="statusText" class="status">Ready</span>
          </div>
          <textarea id="sourceInput" spellcheck="false">; ORANGE-4 / GMC-4 sample
TIA 1
AO
JUMP 00</textarea>
          <div class="hint">Assembly または HEX を入力。HEX例: <code>8 1 1 F 0 0</code></div>
        </section>

        <section class="panel machine-panel" aria-labelledby="machineTitle">
          <div class="panel-header">
            <h2 id="machineTitle">Machine</h2>
            <output id="pcText">PC: 00</output>
          </div>

          <div class="display-row">
            <div class="seven-seg" id="sevenSegment" aria-label="7セグ表示">0</div>
            <div class="led-bank" id="ledBank" aria-label="LED表示"></div>
          </div>

          <div class="register-grid" id="registerGrid"></div>
          <div class="memory-grid" id="memoryGrid" aria-label="メモリ"></div>
        </section>
      </section>

      <section class="panel serial-panel" aria-labelledby="serialTitle">
        <div class="panel-header">
          <h2 id="serialTitle">Write</h2>
          <button id="connectSerialButton" type="button">Connect Serial</button>
        </div>
        <p id="serialStatus">Web Serial API の接続口だけ先に用意しています。転送プロトコルは実機確認後に実装します。</p>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
